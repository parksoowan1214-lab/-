<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전국 야구장 기상 및 라이브 경기 대시보드</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #f4f6f9; --card-bg: #ffffff; --text-main: #2d3748; --text-muted: #718096; --primary: #1a365d; --accent: #d69e2e; --success: #38a169; --warning: #dd6b20; --danger: #e53e3e; --info: #3182ce; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); }
        header { background: linear-gradient(135deg, #0f172a, #1e3a8a); color: white; padding: 1.5rem 2rem; }
        .header-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo h1 { font-size: 1.5rem; font-weight: 800; display: flex; align-items: center; gap: 0.5rem; }
        .logo p { font-size: 0.85rem; color: #94a3b8; margin-top: 0.2rem; }
        
        .main-container { max-width: 1400px; margin: 1.5rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        @media (min-width: 1024px) { .main-container { grid-template-columns: 1.2fr 1fr; } }
        
        .section-title { font-size: 1.2rem; font-weight: 700; color: var(--primary); margin-bottom: 1rem; }
        .stadium-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        @media (min-width: 640px) { .stadium-grid { grid-template-columns: repeat(2, 1fr); } }
        
        .stadium-card { background-color: var(--card-bg); border-radius: 12px; border: 1px solid #e2e8f0; padding: 1.2rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); transition: transform 0.2s; cursor: pointer; }
        .stadium-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.8rem; margin-bottom: 0.8rem; }
        .stadium-name { font-size: 1.1rem; font-weight: 700; color: #1a202c; }
        .home-team { font-size: 0.8rem; color: var(--text-muted); }
        
        .match-info { background: #f8fafc; border-radius: 8px; padding: 0.8rem; margin-bottom: 0.8rem; text-align: center; position: relative; }
        .match-teams { font-size: 1.1rem; font-weight: 800; display: flex; justify-content: center; gap: 1rem; align-items: center; }
        .vs { font-size: 0.8rem; color: #94a3b8; font-weight: 400; }
        .pitchers { font-size: 0.85rem; color: #475569; margin-top: 0.5rem; }
        
        .live-badge { position: absolute; top: -10px; right: -10px; background-color: #e53e3e; color: white; font-size: 0.7rem; font-weight: bold; padding: 0.2rem 0.5rem; border-radius: 12px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(229, 62, 62, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(229, 62, 62, 0); } 100% { box-shadow: 0 0 0 0 rgba(229, 62, 62, 0); } }

        .live-marker-icon { background-color: #e53e3e; border: 2px solid white; border-radius: 50%; width: 16px; height: 16px; animation: pulse 1.5s infinite; }
        .normal-marker-icon { background-color: #3182ce; border: 2px solid white; border-radius: 50%; width: 14px; height: 14px; }

        .weather-info { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; margin-top: 1rem; }
        
        #map { height: 500px; width: 100%; border-radius: 12px; border: 1px solid #e2e8f0; z-index: 1; }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <h1><i class="fa-solid fa-baseball-bat-ball"></i> KBO 실시간 매치 & 기상 대시보드</h1>
                <p>가상 API 데이터를 활용한 프론트엔드 UI 프로토타입</p>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="dashboard-panel">
            <div class="section-title"><i class="fa-solid fa-calendar-day"></i> 오늘(가상)의 KBO 경기 및 선발 라인업</div>
            <div id="stadium-grid" class="stadium-grid"></div>
        </div>

        <div class="map-panel">
            <div class="section-title"><i class="fa-solid fa-map-location-dot"></i> 라이브 구장 맵 (진행중인 경기 표시)</div>
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        const mockApiData = [
            {
                id: 'sajik', name: "사직야구장", homeTeam: "롯데", lat: 35.1944, lng: 129.0610,
                hasGame: true, status: 'LIVE', 
                awayTeam: "KIA", homePitcher: "반즈", awayPitcher: "네일",
                weather: { condition: "맑음", icon: "fa-sun", color: "#ecc94b" }
            },
            {
                id: 'jamsil', name: "잠실야구장", homeTeam: "LG", lat: 37.5122, lng: 127.0719,
                hasGame: true, status: 'PRE_GAME',
                awayTeam: "두산", homePitcher: "켈리", awayPitcher: "곽빈",
                weather: { condition: "흐림", icon: "fa-cloud", color: "#718096" }
            },
            {
                id: 'changwon', name: "창원 NC 파크", homeTeam: "NC", lat: 35.2232, lng: 128.5830,
                hasGame: true, status: 'CANCELED',
                awayTeam: "SSG", homePitcher: "하트", awayPitcher: "김광현",
                weather: { condition: "폭우 (취소됨)", icon: "fa-cloud-showers-heavy", color: "#e53e3e" }
            },
            {
                id: 'gocheok', name: "고척 스카이돔", homeTeam: "키움", lat: 37.4982, lng: 126.8671,
                hasGame: true, status: 'LIVE',
                awayTeam: "한화", homePitcher: "후라도", awayPitcher: "류현진",
                weather: { condition: "실내 경기", icon: "fa-building", color: "#3182ce" }
            },
            {
                id: 'daegu', name: "대구 라이온즈 파크", homeTeam: "삼성", lat: 35.8412, lng: 128.6816,
                hasGame: false, status: 'NO_GAME',
                weather: { condition: "맑음", icon: "fa-sun", color: "#ecc94b" }
            }
        ];

        let map;
        let markers = {};

        function initMap() {
            map = L.map('map').setView([36.3504, 127.3848], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);

            mockApiData.forEach(stadium => {
                const isLive = stadium.status === 'LIVE';
                const customIcon = L.divIcon({
                    className: isLive ? 'live-marker-icon' : 'normal-marker-icon',
                    iconSize: isLive ? [16, 16] : [14, 14]
                });

                const marker = L.marker([stadium.lat, stadium.lng], {icon: customIcon}).addTo(map);
                
                let popupContent = `<b>${stadium.name}</b><br>`;
                if(stadium.hasGame) popupContent += `${stadium.awayTeam} vs ${stadium.homeTeam} ${isLive ? '(진행중!)' : ''}`;
                else popupContent += `오늘 경기 없음`;
                
                marker.bindPopup(popupContent);
                markers[stadium.id] = marker;
            });
        }

        function renderCards() {
            const grid = document.getElementById('stadium-grid');
            
            mockApiData.forEach(stadium => {
                let matchHTML = '';
                
                if (stadium.hasGame) {
                    const isLive = stadium.status === 'LIVE';
                    const isCanceled = stadium.status === 'CANCELED';
                    
                    matchHTML = `
                        <div class="match-info" style="${isCanceled ? 'opacity: 0.5; text-decoration: line-through;' : ''}">
                            ${isLive ? '<div class="live-badge">LIVE</div>' : ''}
                            <div class="match-teams">
                                <span>${stadium.awayTeam}</span>
                                <span class="vs">vs</span>
                                <span>${stadium.homeTeam}</span>
                            </div>
                            <div class="pitchers">
                                선발: ${stadium.awayPitcher} vs ${stadium.homePitcher}
                            </div>
                            ${isCanceled ? '<div style="color:red; font-size:0.8rem; font-weight:bold; margin-top:5px;">우천 취소</div>' : ''}
                        </div>
                    `;
                } else {
                    matchHTML = `<div class="match-info" style="color: #94a3b8; padding: 1.5rem 0;">오늘 경기가 없습니다</div>`;
                }

                const cardHTML = `
                    <div class="stadium-card">
                        <div class="card-header">
                            <span class="stadium-name">${stadium.name}</span>
                            <span class="home-team">홈: ${stadium.homeTeam}</span>
                        </div>
                        ${matchHTML}
                        <div class="weather-info">
                            <span style="color: ${stadium.weather.color}">
                                <i class="fa-solid ${stadium.weather.icon}"></i> ${stadium.weather.condition}
                            </span>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        window.onload = () => {
            initMap();
            renderCards();
        };
    </script>
</body>
</html>
