<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBO 구장별 3일 날씨 & 일정 플래너</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #f4f6f9; --card-bg: #ffffff; --text-main: #2d3748; --text-muted: #718096; --primary: #1a365d; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); }
        
        header { background: linear-gradient(135deg, #0f172a, #1e3a8a); color: white; padding: 1.5rem 2rem; }
        .header-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo h1 { font-size: 1.5rem; font-weight: 800; display: flex; align-items: center; gap: 0.5rem; }
        .logo p { font-size: 0.85rem; color: #94a3b8; margin-top: 0.2rem; }
        
        .main-container { max-width: 1400px; margin: 1.5rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        @media (min-width: 1024px) { .main-container { grid-template-columns: 1.2fr 1fr; } }
        
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .section-title { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
        .sort-select { padding: 0.4rem 0.8rem; border-radius: 8px; border: 1px solid #cbd5e1; cursor: pointer; }
        
        .stadium-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        @media (min-width: 640px) { .stadium-grid { grid-template-columns: repeat(2, 1fr); } }
        
        .stadium-card { background-color: var(--card-bg); border-radius: 12px; border: 1px solid #e2e8f0; padding: 1.2rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); cursor: pointer; transition: transform 0.2s; }
        .stadium-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        .card-header { border-bottom: 1px solid #e2e8f0; padding-bottom: 0.8rem; margin-bottom: 1rem; }
        .stadium-name { font-size: 1.1rem; font-weight: 700; color: #1a202c; }
        .home-team { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; margin-top: 0.2rem; }
        
        /* 3일치 예보 그리드 */
        .forecast-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
        .day-col { background: #f8fafc; border-radius: 8px; padding: 0.8rem 0.5rem; text-align: center; display: flex; flex-direction: column; justify-content: space-between; height: 100%; border: 1px solid #f1f5f9; }
        .day-col.today { background: #eff6ff; border-color: #bfdbfe; }
        
        .day-date { font-size: 0.8rem; font-weight: 700; color: var(--primary); margin-bottom: 0.5rem; }
        .day-weather { font-size: 0.85rem; margin-bottom: 0.8rem; display: flex; flex-direction: column; align-items: center; gap: 0.3rem; font-weight: 600; }
        .day-weather i { font-size: 1.2rem; }
        .day-game { font-size: 0.8rem; color: #475569; line-height: 1.4; font-weight: 600; }
        .no-game { color: #94a3b8; font-weight: 400; }

        #map { height: 600px; width: 100%; border-radius: 12px; border: 1px solid #e2e8f0; z-index: 1; position: sticky; top: 1.5rem; }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <h1><i class="fa-solid fa-baseball-bat-ball"></i> KBO 구장별 3일 직관 플래너</h1>
                <p>경기 일정 및 기상 예보 종합 대시보드</p>
            </div>
        </div>
    </header>

    <div class="main-container">
        <!-- 왼쪽: 경기 및 날씨 목록 -->
        <div class="dashboard-panel">
            <div class="list-header">
                <div class="section-title"><i class="fa-regular fa-calendar"></i> 구장별 3일 일정 & 날씨</div>
                <select id="sortSelect" class="sort-select" onchange="changeSort()">
                    <option value="custom">기본순</option>
                    <option value="name">팀명 가나다순</option>
                </select>
            </div>
            <div id="stadium-grid" class="stadium-grid"></div>
        </div>

        <!-- 오른쪽: 지도 -->
        <div class="map-panel">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        let mockApiData = []; 
        let map;
        let markers = {};
        let currentSort = 'custom';

        async function fetchKboData() {
            try {
                // 파이썬 봇이 생성한 kbo_data.json 읽어오기
                const response = await fetch('kbo_data.json?' + new Date().getTime());
                mockApiData = await response.json();
                
                initMap();
                renderCards();
            } catch (error) {
                console.error("데이터 로드 실패:", error);
                document.getElementById('stadium-grid').innerHTML = '<p style="padding: 2rem; color: #64748b;">데이터를 불러오는 중입니다. 파이썬 봇(GitHub Actions)이 실행 완료되었는지 확인해 주세요.</p>';
            }
        }

        function initMap() {
            if(map) map.remove(); // 기존 맵 초기화
            map = L.map('map').setView([36.3504, 127.3848], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);

            mockApiData.forEach(stadium => {
                const marker = L.marker([stadium.lat, stadium.lng]).addTo(map);
                marker.bindPopup(`<b>${stadium.name}</b><br>${stadium.homeTeam} 홈구장`);
                
                marker.on('click', () => {
                    map.setView([stadium.lat, stadium.lng], 13);
                });
                markers[stadium.id] = marker;
            });
        }

        function changeSort() {
            currentSort = document.getElementById('sortSelect').value;
            renderCards();
        }

        function renderCards() {
            const grid = document.getElementById('stadium-grid');
            grid.innerHTML = '';
            
            let dataToRender = [...mockApiData];
            if (currentSort === 'name') {
                dataToRender.sort((a, b) => a.homeTeam.localeCompare(b.homeTeam));
            }
            
            dataToRender.forEach(stadium => {
                // 3일치 예보를 HTML로 구성
                let forecastHTML = '';
                stadium.forecast.forEach(day => {
                    const isToday = day.label === '오늘';
                    forecastHTML += `
                        <div class="day-col ${isToday ? 'today' : ''}">
                            <div class="day-date">${day.label}<br>(${day.date})</div>
                            <div class="day-weather" style="color: ${day.weather.color}">
                                <i class="fa-solid ${day.weather.icon}"></i>
                                <span>${day.weather.cond}</span>
                            </div>
                            <div class="day-game ${!day.hasGame ? 'no-game' : ''}">
                                ${day.gameInfo}
                            </div>
                        </div>
                    `;
                });

                const cardHTML = `
                    <div class="stadium-card" onclick="map.setView([${stadium.lat}, ${stadium.lng}], 13); markers['${stadium.id}'].openPopup();">
                        <div class="card-header">
                            <div class="stadium-name">${stadium.name}</div>
                            <div class="home-team"><i class="fa-solid fa-house"></i> ${stadium.homeTeam}</div>
                        </div>
                        <div class="forecast-container">
                            ${forecastHTML}
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        window.onload = fetchKboData;
    </script>
</body>
</html>
