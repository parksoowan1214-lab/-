name: KBO 실시간 데이터 업데이트

on:
  schedule:
    # 10분마다 실행되도록 설정
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # GitHub 사이트에서 수동으로 버튼을 눌러서 즉시 실행할 수 있게 해주는 기능

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 파일(json)을 생성하고 수정할 수 있는 권한

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 설치하기
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 파이썬 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 데이터 스크래핑 파이썬 스크립트 실행
        run: python scraper.py

      - name: 변경된 데이터 파일(json) 깃허브에 자동 저장(Commit & Push)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add kbo_data.json
          # 파일에 변경된 내용이 있을 때만 깃허브에 푸시
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update KBO live data" && git push)
